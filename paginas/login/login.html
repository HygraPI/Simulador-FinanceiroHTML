<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

    <!-- LADO ESQUERDO (IMAGEM) -->
    <div class="esquerda"></div>

    <!-- LADO DIREITO (LOGIN) -->
    <div class="direita">
        <div class="login-box">
            <img src="../../imagens/logo hygra.png" alt="Logo Hygra" class="logo">

            <h1>Faça o seu login</h1>

            <h4>Seu E-mail</h4>
            <input type="email" id="ipt_email" placeholder="Digite seu email...">

            <h4>Sua Senha</h4>
            <input type="password" id="ipt_senha" placeholder="Digite sua senha...">

            <button class="entrar" onclick="Login()"><a href="../dashboard/dashboard.html">ENTRAR</a></button><br><br><br>

            Não tem uma conta? <a href="cadastro.html">Crie a sua conta Hygra</a>
            
        </div>
    </div>

</div>



</body>

</html>
<script>
    let tentativas = 0;

    function Login() {
        let email = ipt_email.value
        let senha = ipt_senha.value

        if (email == "admin@123" && senha == "12345") {
            alert("Login realizado com sucesso!")
        } else {
            tentativas = tentativas + 1;
            if (tentativas < 3) {
                alert("E-mail ou senha incorretos! Tentativa " + tentativas + " de 3")
            } else {
                alert("Você tentou muitas vezes. Acesso bloqueado!")
                ipt_email.disabled = true
                ipt_senha.disabled = true
            }
        }
    }
</script>
